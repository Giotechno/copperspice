name: Build CopperSpice Windows 7 32-bit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout du code source
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configurer CMake et Ninja
      uses: lukka/get-cmake@latest

    - name: Télécharger et Installer GCC 13.1.0 (i686 32-bit POSIX)
      run: |
        # Téléchargement direct de GCC 13.1.0 (32 bits, threads posix, gestion d'exceptions dwarf)
        curl -L -o mingw32.zip "https://github.com/brechtsanders/winlibs_mingw/releases/download/13.1.0-16.0.5-11.0.0-r1/winlibs-i686-posix-dwarf-gcc-13.1.0-mingw-w64mingw-builds-11.0.0-r1.zip"
        
        # Extraction de l'archive
        Expand-Archive -Path mingw32.zip -DestinationPath C:\mingw_toolchain
        
        # Ajout du dossier bin au PATH de GitHub pour que CMake trouve gcc et g++
        echo "C:\mingw_toolchain\mingw32\bin" >> $GITHUB_PATH

    - name: Configuration CMake
      run: |
        mkdir build
        cd build
        cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++ -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_FLAGS="-m32 -march=i686 -mtune=generic" -DCMAKE_C_FLAGS="-m32 -march=i686 -mtune=generic" -DCMAKE_EXE_LINKER_FLAGS="-Wl,--large-address-aware" -DCS_BUILD_SHARED=ON -DCS_ENABLE_SSL=OFF -DCMAKE_INSTALL_PREFIX=../copperspice_win32 ..

    - name: Compilation
      run: |
        cd build
        ninja

    - name: Installation
      run: |
        cd build
        ninja install

    - name: Téléverser l'archive des binaires
      uses: actions/upload-artifact@v4
      with:
        name: copperspice-gcc13.1.0-win32
        path: copperspice_win32/
